# Goal: Docker build using github action ( Build the image for Docker Hub frontend and push to Docker Hub

name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build=push-action@7
        with: # extra parameter
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-fe-main:latest
